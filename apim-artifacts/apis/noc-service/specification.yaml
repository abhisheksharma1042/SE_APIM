                      Info: string
                      TimeChanges:
                        - Name: string
                          Bias: 0
                          Active: true
                          ValidFrom: string
                          ValidTo: string
                      Active: true
                      ValidFrom: string
                      ValidTo: string
                  SlotLevels:
                    - Level: string
                      Season: string
                      Turnaround: true
                      Active: true
                      ValidFrom: string
                      ValidTo: string
                  StationFacilities:
                    - Type: string
                      Active: true
                      Default: true
                      Attributes:
                        - Name: string
                          Value: string
                          Comment: string
                          Frequency: string
                          Default: true
                          Active: true
                          ValidFrom: string
                          ValidTo: string
                  StationDistances:
                    - OtherStation: string
                      Frequency: 0
                      AircraftFilter: string
                      BLH: string
                      AirborneHours: string
                      Meters: string
                      Direction: From
                      Active: true
                      ValidFrom: string
                      ValidTo: string
                  StationCategories:
                    - StationCategoryName: string
                      StationCategoryShortCode: string
                      ValidFrom: string
                      ValidTo: string
    patch:
      tags:
        - Airport
      summary: Updates an existing airport with the provided airport data.
      description: Updates an existing airport with the provided airport data.
      operationId: Airport_PatchAirport
      requestBody:
        description: The airport data containing the updated information.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AirportData'
            example:
              ICAO: string
              IATA: string
              LocalName: string
              Name: string
              Active: true
              Default: true
              Distances:
                - OtherStation: string
                  Frequency: 0
                  AircraftFilter: string
                  BLH: string
                  AirborneHours: string
                  Meters: string
                  Direction: From
                  Active: true
                  ValidFrom: string
                  ValidTo: string
              StationFacilities:
                - Type: string
                  Active: true
                  Default: true
                  Attributes:
                    - Name: string
                      Value: string
                      Comment: string
                      Frequency: string
                      Default: true
                      Active: true
                      ValidFrom: string
                      ValidTo: string
      responses:
        '200':
          description: OK
