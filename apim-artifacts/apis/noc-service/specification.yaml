  /nocrestapi/v1/airports:
    get:
      tags:
        - Airport
      summary: 'Retrieves airports optionally filtered by active status, code (IATA or ICAO), airport name, and additional request data.'
      description: 'Retrieves airports optionally filtered by active status, code (IATA or ICAO), airport name, and additional request data.'
      operationId: Airport_GetAirports
      parameters:
        - name: OnlyActive
          in: query
          description: Flag indicating whether to retrieve only active airports (default is false).
          schema:
            type: boolean
        - name: Code
          in: query
          description: The airport ICAO or IATA code.
          schema:
            type: string
        - name: Name
          in: query
          description: The airport name.
          schema:
            type: string
        - name: requestData
          in: query
          description: Additional request data to include.
          schema:
            type: array
            items:
              enum:
                - Airports
                - DaylightSavingTimes
                - Timezones
                - Facilities
                - Distances
                - Categories
              type: string
        - name: offset
          in: query
          description: The offset for paginated results (default 0).
          schema:
            type: integer
            format: int32
        - name: limit
          in: query
          description: The limit for paginated results (default 5000).
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AirportArray'
              example:
                - Name: string
                  CityName: string
                  LocalName: string
                  IATA: string
                  ICAO: string
                  Country: string
                  Gate: string
                  Stand: string
                  Latitude: 0
                  Longitude: 0
                  SlotLevel: string
                  DaylightSavingTimes:
                    - Name: string
                      Info: string
                      TimeChanges:
                        - Name: string
                          Bias: 0
                          Active: true
                          ValidFrom: string
                          ValidTo: string
                      Active: true
                      ValidFrom: string
                      ValidTo: string
                  Timezones:
