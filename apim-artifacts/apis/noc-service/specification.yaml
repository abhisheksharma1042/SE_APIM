openapi: 3.0.1
info:
  title: NOC.Service
  version: v1
servers:
  - url: https://intergration-api-gateway-test.azure-api.net/integration-noc/v1
paths:
  /nocrestapi/v1/accumulated-values:
    get:
      tags:
        - AccumulatedValues
      summary: Retrieves accumulated values based on specified parameters.
      description: Retrieves accumulated values based on specified parameters.
      operationId: AccumulatedValues_GetAccumulatedValues
      parameters:
        - name: RemoveEmpty
          in: query
          description: Flag indicating whether to exclude empty values (default false).
          required: true
          schema:
            type: boolean
        - name: Labels
          in: query
          description: An array of labels to filter the accumulated values.
          required: true
          schema:
            type: array
            items:
              type: string
        - name: AccumulatedValuesTypeFields
          in: query
          description: The type of accumulated values fields.
          required: true
          schema:
            enum:
              - HumanResource
              - Vehicle
            type: string
        - name: From
          in: query
          description: The start date range.
          required: true
          schema:
            type: string
            format: date-time
        - name: To
          in: query
          description: The end date range.
          required: true
          schema:
            type: string
            format: date-time
        - name: FilterID
          in: query
          description: The human resource (crew) filter unique id.
          schema:
            type: integer
            format: int32
        - name: FilterName
          in: query
          description: The human resource (crew) filter name.
          schema:
            type: string
        - name: UniqueID
          in: query
          description: The human resource (crew) unique ID.
          schema:
            type: string
        - name: AggregateDays
          in: query
          description: The number of days to aggregate.
          schema:
            type: integer
            format: int32
        - name: RequestData
          in: query
          description: The list of accumulated values fields to include in the response.
          schema:
            type: array
            items:
              enum:
                - Labels
                - AggregateDays
              type: string
        - name: offset
          in: query
          description: The offset for paginated results (default 0).
          schema:
            type: integer
            format: int32
        - name: limit
          in: query
          description: The limit for paginated results (default 1000).
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccumulatedValueArray'
        '400':
          description: Invalid request
          content:
            application/json: { }
        '401':
          description: Unauthorized
          content:
            application/json: { }
        '404':
          description: Accumulated value not found
          content:
            application/json: { }
        '500':
          description: Internal server error
          content:
            application/json: { }
  /nocrestapi/v1/aircraft:
    get:
      tags:
        - Aircraft
      summary: Retrieves aircraft information based on specified filters.
      description: Retrieves aircraft information based on specified filters.
      operationId: Aircraft_GetAircraft
      parameters:
        - name: FilterID
          in: query
          description: The aircraft filter ID .
          schema:
            type: integer
            format: int32
        - name: FilterName
          in: query
          description: The aircraft filter name.
          schema:
            type: string
        - name: UniqueID
          in: query
          description: The unique id of the aircraft.
          schema:
            type: string
        - name: registration
          in: query
          description: The registration code of the aircraft.
          schema:
            type: string
        - name: requestData
          in: query
          description: The list of fields to include in the response.
          schema:
            type: array
            items:
              enum:
                - MinimumEquipmentList
              type: string
        - name: offset
          in: query
          description: The offset for paginated results (default 0).
          schema:
            type: integer
            format: int32
        - name: limit
          in: query
          description: The limit for paginated results (default 1000).
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AircraftArray'
              example:
                - Owner: string
                  Prefix:
                    IATA: string
                    ICAO: string
                    Company: string
                  UniqueId: 0
                  Registration: string
                  Type: string
                  Version: string
                  Config: string
                  SerialNumber: string
                  MinimumEquipmentList:
                    - Name: string
                      Condition: string
                      Category: string
                      Comment: string
                      ValidHours: 0
                      ValidCycles: 0
                      ExternalReferenceId: 0
                      Deleted: true
                      Active: true
                      ValidFrom: string
                      ValidTo: string
                  Name: string
                  NickName: string
                  AircraftNotes:
                    - NoteID: string
                      NoteText: string
                      NoteType: string
                      CreatedBy: string
                      ValidFrom: string
                      ValidTo: string
        '400':
          description: Invalid request
          content:
            application/json: { }
        '401':
          description: Unauthorized
          content:
            application/json: { }
        '404':
          description: Aircraft not found
          content:
            application/json: { }
        '500':
          description: Internal server error
          content:
            application/json: { }
    post:
      tags:
        - Aircraft
      summary: Update an existing aircraft record with the provided data.
      description: Update an existing aircraft record with the provided data.
      operationId: Aircraft_PostAircraft
      requestBody:
        description: The data of the aircraft to update.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AircraftIn'
            example:
              VehicleRegistration: string
              MinimumEquipmentList:
                - Name: string
                  Condition: string
                  Category: string
                  Comment: string
                  ValidHours: 0
                  ValidCycles: 0
                  ExternalReferenceId: 0
                  Deleted: true
                  Active: true
                  ValidFrom: string
                  ValidTo: string
              AircraftNotes:
                - Id: 0
                  Message: string
                  NoteType: string
                  ValidFrom: string
                  ValidTo: string
                  Deleted: true
                  Modified: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NocrestapiV1AircraftPost200ApplicationJsonResponse'
              example: 'True'
        '400':
          description: Invalid request
          content:
            application/json: { }
        '401':
          description: Unauthorized
          content:
            application/json: { }
        '404':
          description: Aircraft not found
          content:
            application/json: { }
        '500':
          description: Internal server error
          content:
            application/json: { }
  '/nocrestapi/v1/aircraft/{id}':
    get:
      tags:
        - Aircraft
      summary: Retrieves aircraft information by unique ID or registration.
      description: Retrieves aircraft information by unique ID or registration.
      operationId: Aircraft_GetAircraftByUniqueID
      parameters:
        - name: id
          in: path
          description: The unique ID or registration of the aircraft.
          required: true
          schema:
            type: string
        - name: includeMels
          in: query
          description: Flag indicating whether to include MELs (Minimum Equipment Lists) for the aircraft (default false).
          schema:
            type: boolean
        - name: includeNotes
          in: query
          description: Flag indicating whether to include notes for the aircraft (default false).
          schema:
            type: boolean
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AircraftArray'
              example:
                - Owner: string
                  Prefix:
                    IATA: string
                    ICAO: string
                    Company: string
                  UniqueId: 0
                  Registration: string
                  Type: string
                  Version: string
                  Config: string
                  SerialNumber: string
                  MinimumEquipmentList:
                    - Name: string
                      Condition: string
                      Category: string
                      Comment: string
                      ValidHours: 0
                      ValidCycles: 0
                      ExternalReferenceId: 0
                      Deleted: true
                      Active: true
                      ValidFrom: string
                      ValidTo: string
                  Name: string
                  NickName: string
                  AircraftNotes:
                    - NoteID: string
                      NoteText: string
                      NoteType: string
                      CreatedBy: string
                      ValidFrom: string
                      ValidTo: string
        '400':
          description: Invalid request
          content:
            application/json: { }
        '401':
          description: Unauthorized
          content:
            application/json: { }
        '404':
          description: Aircraft not found
          content:
            application/json: { }
        '500':
          description: Internal server error
          content:
            application/json: { }
  '/nocrestapi/v1/aircraft/{registration}':
